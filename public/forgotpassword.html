<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Member Login | Baby Info</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Bricolage+Grotesque:wght@400;600;800&family=Caveat:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        /* @author Romila Raluca */

        :root {
            --bg-paper: #e0d9cd;
            --primary: #130202;
            --secondary: #9d422c;
            --text-body: #504443;
            --text-muted: #75889c;
            --outline: #d4c2c1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-paper);
            background-image: url("https://www.transparenttextures.com/patterns/pinstriped-suit.png");
            color: var(--text-body);
            font-family: 'Courier Prime', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; border: none; font-family: inherit; }
        input { font-family: inherit; }

        .font-headline { font-family: 'Libre Caslon Text', serif; }
        .font-handwritten { font-family: 'Caveat', cursive; }
        .font-typewriter { font-family: 'Special Elite', cursive; }

        .material-symbols-outlined { vertical-align: middle; }

        /* Main Container */
        .wrapper {
            width: 100%;
            max-width: 500px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: -80px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
        }

        .top-bar .logo {
            font-size: 1.8rem;
            color: var(--primary);
        }

        .top-bar a {
            font-size: 0.85rem;
            color: var(--text-muted);
            opacity: 0.8;
            transition: color 0.2s;
        }
        .top-bar a:hover { color: var(--secondary); }

        /* The Index Card */
        .index-card {
            width: 100%;
            background-color: #f9f5ec;
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 100% 2.5rem;
            box-shadow: 3px 3px 15px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.05);
            position: relative;
            padding: 2.5rem;
            min-height: 480px;
            display: flex;
            flex-direction: column;
            transform: rotate(-1deg);
            transition: transform 0.1s ease-out;
        }

        /* Paper Clip Decor */
        .paper-clip-decor {
            position: absolute;
            top: -1.5rem;
            right: 4rem;
            z-index: 20;
            pointer-events: none;
            opacity: 0.8;
            transform: rotate(15deg);
        }
        .paper-clip-decor .material-symbols-outlined {
            font-size: 4.5rem;
            color: #94a3b8;
        }

        /* Card Header Elements */
        .card-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
        }

        .official-mark {
            font-family: 'Special Elite', cursive;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            opacity: 0.6;
            transform: rotate(-12deg);
        }

        .form-meta {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            opacity: 0.6;
            text-align: right;
            line-height: 1.4;
        }

        .card-title {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
            border-bottom: 2px solid rgba(19, 2, 2, 0.2);
            padding-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        @media(min-width: 768px) { .card-title { font-size: 1.8rem; } }

        .handwritten-note {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            padding-left: 0.5rem;
        }

        /* Form Area */
        .form-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .input-group {
            margin-bottom: 2rem;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: rgba(80, 68, 67, 0.7);
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .input-field {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(19, 2, 2, 0.3);
            font-size: 1.1rem;
            color: var(--primary);
            padding: 0.25rem 0;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-bottom-color: var(--secondary);
        }
        .input-field::placeholder { opacity: 0.2; }

        /* Action Area */
        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding-top: 1rem;
        }

        .stamp-button {
            background: var(--secondary);
            color: white;
            padding: 1rem 2rem;
            border: 4px double rgba(255,255,255,0.3);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.1s ease;
            position: relative;
        }
        .stamp-button::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
            opacity: 0.2;
            pointer-events: none;
        }
        .stamp-button:active {
            transform: scale(0.98) translateY(2px);
            box-shadow: 0px 0px 0px rgba(0,0,0,0);
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-link .material-symbols-outlined {
            color: var(--secondary);
            font-size: 1rem;
        }
        .back-link a {
            font-size: 1.3rem;
            color: var(--secondary);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
            transition: color 0.2s;
        }
        .back-link a:hover { color: var(--primary); }

        /* Faded Bottom Stamp */
        .faded-stamp {
            position: absolute;
            bottom: 1.5rem;
            left: 1.5rem;
            opacity: 0.1;
            pointer-events: none;
        }
        .ink-stamp {
            border: 3px solid var(--primary);
            color: var(--primary);
            padding: 0.5rem 1rem;
            display: inline-block;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.75rem;
            transform: rotate(-3deg);
            mask-image: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
            -webkit-mask-image: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
        }

        .serial-number {
            position: absolute;
            bottom: 1rem;
            right: 1.5rem;
            font-size: 0.65rem;
            color: var(--primary);
            opacity: 0.3;
            user-select: none;
        }

        /* Decorative Leaf */
        .pressed-leaf {
            position: absolute;
            bottom: -7rem;
            left: -5rem;
            width: 14rem;
            height: 14rem;
            opacity: 0.2;
            pointer-events: none;
            transform: rotate(45deg);
        }
        .pressed-leaf img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: grayscale(1);
        }

        /* Fixed Footer */
        .fixed-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        .fixed-footer p {
            font-size: 0.85rem;
            color: rgba(117, 136, 156, 0.6);
            pointer-events: auto;
        }
        .help-icon {
            width: 2rem; height: 2rem;
            border-radius: 50%;
            background: rgba(148, 163, 184, 0.2);
            border: 1px solid rgba(148, 163, 184, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: help;
            pointer-events: auto;
        }
        .help-icon .material-symbols-outlined {
            font-size: 1rem;
            color: rgba(80, 68, 67, 0.6);
        }

    </style>
</head>
<body>

<main class="wrapper">
    <header class="top-bar">
        <a href="/" class="logo font-headline" style="text-decoration:none;color:inherit;">Baby Info</a>
        <a href="/login" class="font-typewriter">Return to Catalog</a>
    </header>

    <div class="index-card">
        <div class="paper-clip-decor">
            <span class="material-symbols-outlined">attach_file</span>
        </div>

        <div class="card-header-top">
            <div class="official-mark">CASE NO. 404-LOST</div>
            <div class="form-meta font-typewriter">Form 22-B<br>Memory Recovery Dept.</div>
        </div>

        <h1 class="card-title font-typewriter">
            <span class="material-symbols-outlined" style="opacity: 0.4;">find_in_page</span>
            Lost Item Report
        </h1>

        <p class="handwritten-note font-handwritten">
            Patient claims to have misplaced their access key...
        </p>

        <form class="form-area" id="resetForm">
            <div class="input-group">
                <label class="font-typewriter" for="email">Subject Email:</label>
                <input type="email" id="email" name="email" class="input-field" placeholder="ADDRESS_REQUIRED" required>
            </div>

            <div class="action-area">
                <button type="submit" class="stamp-button font-typewriter">
                    <span class="material-symbols-outlined">print</span>
                    Authorize Reset
                </button>

                <div class="back-link">
                    <span class="material-symbols-outlined">west</span>
                    <a href="/login" class="font-handwritten">return to secure portal</a>
                </div>
            </div>
        </form>

        <div class="faded-stamp">
            <div class="ink-stamp font-typewriter">RE-ENTRY REQUEST APPROVED</div>
        </div>

        <div class="serial-number font-typewriter">IDX-CARD-MEM-7726</div>
    </div>

    <div class="pressed-leaf">
        <img src="https://images.unsplash.com/photo-1611145367651-6303b47e4040?auto=format&fit=crop&w=400&q=80" alt="Pressed fern leaf">
    </div>
</main>

<footer class="fixed-footer">
    <p class="font-typewriter">© 2026 Baby Info | Archive 11</p>
    <div class="help-icon" title="Need help?">
        <span class="material-symbols-outlined">help</span>
    </div>
</footer>

<script>
    /* @author Romila Raluca */

    // Micro-interaction: Subtle card shift on mouse move
    const card = document.querySelector('.index-card');
    card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const rotateX = (y - centerY) / 50;
        const rotateY = (centerX - x) / 50;

        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) rotate(-1deg)`;
    });

    card.addEventListener('mouseleave', () => {
        card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) rotate(-1deg)`;
    });

    // ── Forgot password ─────────────────────────────────────────────────────
    // Nota: endpoint-ul POST /api/auth/forgot-password nu este inca implementat
    // in backend. Formularul afiseaza un mesaj de succes pentru UX.
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn   = e.target.querySelector('button[type="submit"]');
        const email = document.getElementById('email').value.trim();

        btn.disabled = true;
        btn.innerHTML = '<span class="material-symbols-outlined">hourglass_top</span> Stamping...';

        // TODO: cand backend-ul e gata, apeleaza:
        // await fetch('/api/auth/forgot-password', {
        //     method: 'POST',
        //     headers: { 'Content-Type': 'application/json' },
        //     body: JSON.stringify({ email }),
        // });

        // Simulare delay trimitere
        await new Promise(r => setTimeout(r, 1200));

        // Ascunde formularul si afiseaza confirmare
        e.target.style.display = 'none';
        const confirmDiv = document.createElement('div');
        confirmDiv.style.cssText = 'text-align:center; padding:2rem 0; flex-grow:1; display:flex; flex-direction:column; align-items:center; gap:1.5rem;';
        confirmDiv.innerHTML = `
            <span class="material-symbols-outlined" style="font-size:3rem; color:var(--secondary);">mark_email_read</span>
            <p class="font-typewriter" style="font-size:1rem; color:var(--text-body);">
                If <strong>${email}</strong> is registered,<br>a recovery dispatch has been sent.
            </p>
            <a href="/login" class="font-handwritten" style="color:var(--secondary); font-size:1.5rem; text-decoration:underline; text-underline-offset:4px;">
                ← Return to login
            </a>
        `;
        e.target.parentElement.insertBefore(confirmDiv, e.target);
    });
</script>
</body>
</html>
