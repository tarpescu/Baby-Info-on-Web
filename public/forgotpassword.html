<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Member Login | Baby Info</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Bricolage+Grotesque:wght@400;600;800&family=Caveat:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/forgotpassword.css">
</head>
<body>

<main class="wrapper">
    <header class="top-bar">
        <a href="/" class="logo font-headline" style="text-decoration:none;color:inherit;">Baby Info</a>
        <a href="/login" class="font-typewriter">Return to Catalog</a>
    </header>

    <div class="index-card">
        <div class="paper-clip-decor">
            <span class="material-symbols-outlined">attach_file</span>
        </div>

        <div class="card-header-top">
            <div class="official-mark">CASE NO. 404-LOST</div>
            <div class="form-meta font-typewriter">Form 22-B<br>Memory Recovery Dept.</div>
        </div>

        <h1 class="card-title font-typewriter">
            <span class="material-symbols-outlined" style="opacity: 0.4;">find_in_page</span>
            Lost Item Report
        </h1>

        <p class="handwritten-note font-handwritten">
            Patient claims to have misplaced their access key...
        </p>

        <form class="form-area" id="resetForm">
            <div class="input-group">
                <label class="font-typewriter" for="email">Subject Email:</label>
                <input type="email" id="email" name="email" class="input-field" placeholder="ADDRESS_REQUIRED" required>
            </div>

            <div class="input-group">
                <label class="font-typewriter" for="a1">Numele primului tău animal de companie?</label>
                <input type="text" id="a1" class="input-field" placeholder="..." autocomplete="off" required>
            </div>
            <div class="input-group">
                <label class="font-typewriter" for="a2">Care era porecla ta din copilărie?</label>
                <input type="text" id="a2" class="input-field" placeholder="..." autocomplete="off" required>
            </div>
            <div class="input-group">
                <label class="font-typewriter" for="a3">În ce oraș ai copilărit?</label>
                <input type="text" id="a3" class="input-field" placeholder="..." autocomplete="off" required>
            </div>
            <div class="input-group">
                <label class="font-typewriter" for="newPassword">New Password:</label>
                <input type="password" id="newPassword" class="input-field" minlength="8" placeholder="MIN 8 CHARS" autocomplete="new-password" required>
            </div>

            <p id="resetError" class="font-typewriter"
               style="display:none; color:#ba1a1a; font-size:0.85rem; margin-bottom:0.5rem;"></p>

            <div class="action-area">
                <button type="submit" class="stamp-button font-typewriter">
                    <span class="material-symbols-outlined">lock_reset</span>
                    Reset Password
                </button>

                <div class="back-link">
                    <span class="material-symbols-outlined">west</span>
                    <a href="/login" class="font-handwritten">return to secure portal</a>
                </div>
            </div>
        </form>

        <div class="faded-stamp">
            <div class="ink-stamp font-typewriter">RE-ENTRY REQUEST APPROVED</div>
        </div>

        <div class="serial-number font-typewriter">IDX-CARD-MEM-7726</div>
    </div>

    <div class="pressed-leaf">
        <img src="https://images.unsplash.com/photo-1611145367651-6303b47e4040?auto=format&fit=crop&w=400&q=80" alt="Pressed fern leaf">
    </div>
</main>

<footer class="fixed-footer">
    <p class="font-typewriter">© 2026 Baby Info | Archive 11</p>
    <div class="help-icon" title="Need help?">
        <span class="material-symbols-outlined">help</span>
    </div>
</footer>

<script>
    /* @author Romila Raluca */

    // Micro-interaction: Subtle card shift on mouse move
    const card = document.querySelector('.index-card');
    card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const rotateX = (y - centerY) / 50;
        const rotateY = (centerX - x) / 50;

        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) rotate(-1deg)`;
    });

    card.addEventListener('mouseleave', () => {
        card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) rotate(-1deg)`;
    });

    // ── CSRF helper (double-submit cookie + header X-CSRF-Token) ─────────────
    let _csrfToken = null;
    /**
     * Obtine token-ul CSRF de la server (o singura data per pagina).
     * @returns {Promise<string>}
     */
    async function getCsrfToken() {
        if (_csrfToken) return _csrfToken;
        try {
            const r = await fetch('/api/auth/csrf', { credentials: 'include' });
            const d = await r.json();
            _csrfToken = d.token || '';
        } catch { _csrfToken = ''; }
        return _csrfToken;
    }

    // ── Forgot password — reset pe baza de intrebari de securitate ───────────
    const resetForm = document.getElementById('resetForm');
    const resetError = document.getElementById('resetError');

    resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        resetError.style.display = 'none';
        const btn = e.target.querySelector('button[type="submit"]');

        const payload = {
            email: document.getElementById('email').value.trim(),
            security_answer_1: document.getElementById('a1').value.trim(),
            security_answer_2: document.getElementById('a2').value.trim(),
            security_answer_3: document.getElementById('a3').value.trim(),
            new_password: document.getElementById('newPassword').value,
        };

        if (payload.new_password.length < 8) {
            resetError.textContent = 'Password must be at least 8 characters.';
            resetError.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="material-symbols-outlined">hourglass_top</span> Resetting...';

        try {
            const csrf = await getCsrfToken();
            const res = await fetch('/api/auth/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrf },
                credentials: 'include',
                body: JSON.stringify(payload),
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                throw new Error(data.error || 'Reset failed');
            }

            // Succes -> confirmare + redirect la login
            resetForm.style.display = 'none';
            const confirmDiv = document.createElement('div');
            confirmDiv.style.cssText = 'text-align:center; padding:2rem 0; flex-grow:1; display:flex; flex-direction:column; align-items:center; gap:1.5rem;';
            confirmDiv.innerHTML = `
                <span class="material-symbols-outlined" style="font-size:3rem; color:var(--secondary);">task_alt</span>
                <p class="font-typewriter" style="font-size:1rem; color:var(--text-body);">Password reset! Redirecting to login…</p>
            `;
            resetForm.parentElement.insertBefore(confirmDiv, resetForm);
            setTimeout(() => { window.location.href = '/login'; }, 1500);
        } catch (err) {
            resetError.textContent = err.message;
            resetError.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<span class="material-symbols-outlined">lock_reset</span> Reset Password';
        }
    });
</script>
</body>
</html>
