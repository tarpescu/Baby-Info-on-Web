<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Join Family | Baby Info</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Bricolage+Grotesque:wght@400;600;800&family=Caveat:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        /* @author Romila Raluca */

        /* ─────────────────────────────────────────────
           1. CSS VARIABLES
        ───────────────────────────────────────────── */
        :root {
            --bg-paper: #e0d9cd;
            --primary: #130202;
            --secondary: #9d422c;
            --text-body: #504443;
            --text-muted: #75889c;
            --scrap-sage: #d8e2dc;
            --scrap-blush: #f0e6e6;
            --outline: #d4c2c1;
            --tape-blue: rgba(131, 166, 183, 0.6);
        }

        /* ─────────────────────────────────────────────
           2. RESET & BASE
        ───────────────────────────────────────────── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-paper);
            background-image: radial-gradient(circle at 2px 2px, rgba(0,0,0,0.03) 1px, transparent 0);
            background-size: 24px 24px;
            color: var(--text-body);
            font-family: 'Courier Prime', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 1rem;
        }

        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; border: none; font-family: inherit; }
        input, select { font-family: inherit; }
        .material-symbols-outlined { vertical-align: middle; }

        /* ─────────────────────────────────────────────
           3. LAYOUT
        ───────────────────────────────────────────── */
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            transform: rotate(-0.5deg);
        }

        .kraft-texture {
            position: absolute;
            top: -3rem; right: -3rem;
            width: 7rem; height: 7rem;
            background-color: #dccfb8;
            opacity: 0.35;
            transform: rotate(-8deg);
            z-index: -1;
            border-radius: 4px;
        }

        .blush-scrap {
            position: absolute;
            bottom: -2rem; left: -2.5rem;
            width: 10rem; height: 5rem;
            background-color: var(--scrap-blush);
            opacity: 0.4;
            transform: rotate(5deg);
            z-index: -1;
            clip-path: polygon(
                0% 0%, 100% 0%, 100% 95%, 96% 98%, 92% 94%,
                88% 99%, 83% 95%, 78% 100%, 73% 94%, 68% 98%,
                63% 95%, 57% 100%, 51% 94%, 46% 98%, 40% 95%,
                34% 100%, 28% 94%, 22% 98%, 16% 95%, 10% 100%,
                5% 94%, 0% 98%
            );
        }

        /* Envelope flap decorativa */
        .envelope-top {
            width: 100%;
            height: 60px;
            background: linear-gradient(135deg, #d4c9b8 50%, #c9bfaf 50%);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            opacity: 0.6;
            margin-bottom: -2px;
        }

        /* The Index Card */
        .index-card {
            background-color: #ffffff;
            background-image: linear-gradient(rgba(173, 216, 230, 0.5) 1px, transparent 1px);
            background-size: 100% 2.5rem;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1), 10px 10px 25px rgba(0,0,0,0.05);
            position: relative;
            padding: 3rem;
            display: flex;
            flex-direction: column;
        }

        .index-card::before {
            content: '';
            position: absolute;
            top: 2.5rem;
            left: 0; right: 0;
            height: 1px;
            background: rgba(255, 0, 0, 0.2);
        }

        .washi-tape {
            position: absolute;
            top: -1.5rem; right: 3rem;
            width: 100px; height: 38px;
            background: var(--tape-blue);
            backdrop-filter: blur(1px);
            transform: rotate(2deg);
            clip-path: polygon(0% 15%, 5% 0%, 95% 5%, 100% 15%, 98% 85%, 92% 100%, 8% 95%, 0% 85%);
            z-index: 20;
        }

        /* ─────────────────────────────────────────────
           4. INVITATION BANNER
        ───────────────────────────────────────────── */
        .invite-banner {
            background: rgba(157, 66, 44, 0.06);
            border: 1px dashed var(--outline);
            border-radius: 2px;
            padding: 1rem 1.2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .invite-banner .label {
            font-family: 'Special Elite', cursive;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.35rem;
        }

        .invite-banner .child-name {
            font-family: 'Libre Caslon Text', serif;
            font-size: 1.4rem;
            color: var(--primary);
        }

        .invite-banner .role-badge {
            display: inline-block;
            margin-top: 0.4rem;
            font-family: 'Special Elite', cursive;
            font-size: 0.75rem;
            color: var(--secondary);
            letter-spacing: 1px;
            border-bottom: 1px solid var(--secondary);
            padding-bottom: 1px;
        }

        /* ─────────────────────────────────────────────
           5. FORM
        ───────────────────────────────────────────── */
        header {
            margin-bottom: 2rem;
            padding-top: 1rem;
            text-align: center;
        }

        .doc-title {
            font-size: 2rem;
            color: var(--primary);
            font-family: 'Libre Caslon Text', serif;
            line-height: 1.2;
        }

        .doc-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.4rem;
            font-family: 'Special Elite', cursive;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 2rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Special Elite', cursive;
        }

        .form-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--outline);
            font-size: 1.1rem;
            color: var(--primary);
            padding: 0 0 0.25rem 0;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-bottom-color: var(--secondary);
        }
        .form-input::placeholder { opacity: 0.3; }

        /* ─────────────────────────────────────────────
           6. SUBMIT
        ───────────────────────────────────────────── */
        .submit-section {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        .ink-seal {
            width: 8rem; height: 8rem;
            border-radius: 50%;
            background-color: var(--secondary);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
            border: 4px dashed rgba(255,255,255,0.2);
            mask-image: radial-gradient(circle, black 70%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle, black 70%, transparent 100%);
            transition: all 0.2s ease;
            font-family: 'Special Elite', cursive;
        }
        .ink-seal:hover { transform: scale(1.05) rotate(-2deg); filter: brightness(1.1); }
        .ink-seal:active { transform: scale(0.95); }
        .ink-seal .text { font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 4px; }
        .ink-seal .icon { font-size: 2.2rem; }
        .ink-seal .subtext { font-size: 0.6rem; opacity: 0.8; margin-top: 4px; }

        .login-link {
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        .login-link a {
            color: var(--secondary);
            text-decoration: underline;
            text-decoration-style: wavy;
            text-underline-offset: 4px;
        }
        .login-link a:hover { color: var(--primary); }

        /* ─────────────────────────────────────────────
           7. STATES: LOADING / ERROR / INVALID TOKEN
        ───────────────────────────────────────────── */
        .msg-box {
            display: none;
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            font-family: 'Special Elite', cursive;
            font-size: 0.9rem;
            border-left: 3px solid;
        }
        .msg-box.error {
            background: rgba(157,66,44,0.08);
            border-color: var(--secondary);
            color: var(--secondary);
        }
        .msg-box.success {
            background: rgba(100,160,100,0.1);
            border-color: #5a9a5a;
            color: #3d6e3d;
        }

        /* Stare tokenul invalid — acoperă tot cardul */
        .token-invalid {
            text-align: center;
            padding: 2rem 1rem;
        }
        .token-invalid .big-icon {
            font-size: 3.5rem;
            color: var(--secondary);
            display: block;
            margin-bottom: 0.75rem;
        }
        .token-invalid h2 {
            font-family: 'Libre Caslon Text', serif;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .token-invalid p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }
        .token-invalid a {
            color: var(--secondary);
            text-decoration: underline wavy;
        }

        .footer-stamp {
            margin-top: 2rem;
            border-top: 1px solid var(--outline);
            padding-top: 1rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-family: 'Special Elite', cursive;
            opacity: 0.5;
        }

        /* Skeleton loader in timp ce validam tokenul */
        .skeleton {
            background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 3px;
            height: 1.2rem;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 480px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .index-card { padding: 2rem; }
        }
    </style>
</head>
<body>

<main class="wrapper">
    <div class="kraft-texture"></div>
    <div class="blush-scrap"></div>

    <!-- Envelope flap decorativa -->
    <div class="envelope-top"></div>

    <div class="index-card">
        <div class="washi-tape"></div>

        <!-- ── Starea de incarcare ── -->
        <div id="loadingState" style="padding: 2rem 0;">
            <div class="skeleton" style="width:60%; margin: 0 auto 1rem;"></div>
            <div class="skeleton" style="width:40%; margin: 0 auto 2rem;"></div>
            <div class="skeleton" style="width:100%; margin-bottom:1rem; height:2rem;"></div>
            <div class="skeleton" style="width:100%; height:2rem;"></div>
        </div>

        <!-- ── Token invalid ── -->
        <div id="invalidState" style="display:none;">
            <div class="token-invalid">
                <span class="material-symbols-outlined big-icon">mail_off</span>
                <h2>Invitation Not Found</h2>
                <p id="invalidMsg">This invite link is invalid or has already been used.</p>
                <a href="/login">Go to Login →</a>
            </div>
        </div>

        <!-- ── Formularul de join ── -->
        <div id="joinState" style="display:none;">
            <header>
                <a href="/" style="text-decoration:none;">
                    <h1 class="doc-title">Baby Info</h1>
                </a>
                <p class="doc-subtitle">FAMILY ADMISSION · FORM J-47</p>
            </header>

            <!-- Banner invitatie -->
            <div class="invite-banner" id="inviteBanner">
                <p class="label">You've been invited to follow</p>
                <p class="child-name" id="childName">…</p>
                <span class="role-badge" id="roleBadge">…</span>
            </div>

            <form id="joinForm">
                <div class="msg-box error" id="errorBox">
                    <span class="material-symbols-outlined" style="font-size:1rem;margin-right:4px;">error</span>
                    <span id="errorText"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name:</label>
                        <input type="text" id="firstName" class="form-input" placeholder="Ana" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name:</label>
                        <input type="text" id="lastName" class="form-input" placeholder="Popescu" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" class="form-input" placeholder="ana@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Choose a Password:</label>
                    <input type="password" id="password" class="form-input" placeholder="min. 6 characters" required minlength="6">
                </div>

                <div class="submit-section">
                    <button type="submit" id="joinBtn" class="ink-seal">
                        <span class="text">JOIN</span>
                        <span class="material-symbols-outlined icon">family_home</span>
                        <span class="subtext">ACCEPTED</span>
                    </button>

                    <p class="login-link">
                        Already have an account? <a href="/login">Sign in</a>
                    </p>
                </div>
            </form>
        </div>

        <footer class="footer-stamp">
            <span>ARCHIVE VOL. 2026</span>
            <span>STAMPED &amp; FILED</span>
        </footer>
    </div>
</main>

<script>
    /* @author Romila Raluca */

    // Mapare permission -> eticheta prietenoasă
    const ROLE_LABELS = {
        owner:    'Owner',
        coparent: 'Co-Parent',
        caregiver:'Caregiver',
        viewer:   'Viewer',
    };

    const loadingState = document.getElementById('loadingState');
    const invalidState = document.getElementById('invalidState');
    const joinState    = document.getElementById('joinState');
    const invalidMsg   = document.getElementById('invalidMsg');
    const errorBox     = document.getElementById('errorBox');
    const errorText    = document.getElementById('errorText');
    const joinBtn      = document.getElementById('joinBtn');

    let inviteToken = '';
    let inviteData  = null;

    // ── CSRF helper ──────────────────────────────────────────────────────────
    let _csrfToken = null;
    async function getCsrfToken() {
        if (_csrfToken) return _csrfToken;
        try {
            const r = await fetch('/api/auth/csrf', { credentials: 'include' });
            const d = await r.json();
            _csrfToken = d.token || '';
        } catch { _csrfToken = ''; }
        return _csrfToken;
    }

    /**
     * Afiseaza mesaj de eroare in caseta vintage.
     * @param {string} msg
     */
    function showError(msg) {
        errorText.textContent = msg;
        errorBox.style.display = 'block';
    }

    /**
     * Valideaza tokenul de invitatie si populeaza UI-ul.
     */
    async function validateToken() {
        const params = new URLSearchParams(window.location.search);
        inviteToken = params.get('token') || '';

        if (!inviteToken) {
            loadingState.style.display = 'none';
            invalidState.style.display = 'block';
            invalidMsg.textContent = 'No invite token found in URL.';
            return;
        }

        try {
            const res = await fetch(`/api/invite?token=${encodeURIComponent(inviteToken)}`, {
                credentials: 'include',
            });

            loadingState.style.display = 'none';

            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                invalidState.style.display = 'block';
                invalidMsg.textContent = data.error || 'This invite link is invalid or has expired.';
                return;
            }

            inviteData = await res.json();

            // Populam bannerul
            document.getElementById('childName').textContent = inviteData.child_name || '—';
            document.getElementById('roleBadge').textContent =
                ROLE_LABELS[inviteData.permission] ?? inviteData.permission;

            joinState.style.display = 'block';

        } catch (err) {
            loadingState.style.display = 'none';
            invalidState.style.display = 'block';
            invalidMsg.textContent = 'Connection error. Please try again.';
        }
    }

    /**
     * Trimite formularul de inregistrare cu tokenul de invitatie.
     */
    document.getElementById('joinForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.style.display = 'none';

        const payload = {
            first_name:   document.getElementById('firstName').value.trim(),
            last_name:    document.getElementById('lastName').value.trim(),
            email:        document.getElementById('email').value.trim(),
            password:     document.getElementById('password').value,
            invite_token: inviteToken,
        };

        joinBtn.querySelector('.text').textContent    = '...';
        joinBtn.querySelector('.subtext').textContent = 'WAIT';
        joinBtn.disabled = true;

        try {
            const res = await fetch('/api/auth/register', {
                method:      'POST',
                headers:     { 'Content-Type': 'application/json', 'X-CSRF-Token': await getCsrfToken() },
                credentials: 'include',
                body:        JSON.stringify(payload),
            });

            const data = await res.json();

            if (!res.ok) {
                showError(data.error || 'Registration failed. Please try again.');
                joinBtn.querySelector('.text').textContent    = 'JOIN';
                joinBtn.querySelector('.subtext').textContent = 'ACCEPTED';
                joinBtn.disabled = false;
                return;
            }

            // Succes — logam automat si redirectam
            joinBtn.querySelector('.text').textContent    = 'DONE!';
            joinBtn.querySelector('.subtext').textContent = 'WELCOME';

            // Auto-login
            const loginRes = await fetch('/api/auth/login', {
                method:      'POST',
                headers:     { 'Content-Type': 'application/json', 'X-CSRF-Token': await getCsrfToken() },
                credentials: 'include',
                body:        JSON.stringify({ email: payload.email, password: payload.password }),
            });

            if (loginRes.ok) {
                window.location.href = '/dashboard';
            } else {
                // Login esuat dar contul exista — trimitem la login cu banner
                window.location.href = '/login?registered=1';
            }

        } catch (err) {
            showError('Connection error. Please try again.');
            joinBtn.querySelector('.text').textContent    = 'JOIN';
            joinBtn.querySelector('.subtext').textContent = 'ACCEPTED';
            joinBtn.disabled = false;
        }
    });

    // Pornire
    validateToken();
</script>
</body>
</html>
