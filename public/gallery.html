<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gallery | Baby Info</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Bricolage+Grotesque:wght@400;600;800&family=Caveat:wght@400;700&family=Special+Elite&family=Figtree:wght@300;400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/gallery.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a href="/dashboard" class="nav-logo">Baby Info</a>
    <div class="nav-links font-label">
        <a href="/dashboard">Journal</a>
        <a href="/gallery" class="active">Gallery</a>
        <a href="/medical">Medical</a>
        <a href="/family">Family</a>
        <a href="/admin" id="adminNavLink" style="display:none;">Admin</a>
    </div>
    <div class="nav-actions">
        <select id="childSelector" style="display:none;" title="Select child"></select>
        <button id="logoutBtn" class="font-typewriter">Log Out</button>
    </div>
</nav>

<!-- Decorative Shelf -->
<section class="shelf-section" id="shelfSection" style="display:none;">
    <div class="shelf-board" id="shelfBoard">
        <!-- populated by JS with child's initials blocks + decorations -->
        <button class="shelf-upload-slot" id="shelfUploadBtn" title="Add a new moment">
            <span class="material-symbols-outlined">add_a_photo</span>
            <span class="slot-label">ADD</span>
        </button>
    </div>
</section>

<!-- Filter Bar -->
<div class="filter-bar" id="filterBar" style="display:none;">
    <span class="filter-label">Filter:</span>
    <button class="filter-chip active" data-type="all">All</button>
    <button class="filter-chip" data-type="photo">📷 Photos</button>
    <button class="filter-chip" data-type="video">🎬 Video</button>
    <button class="filter-chip" data-type="audio">🎵 Audio</button>
    <button class="filter-chip" data-type="note">📝 Notes</button>
    <span class="filter-label" id="tagFilterLabel" style="display:none; margin-left:1rem;">Tags:</span>
    <span id="tagChips" style="display:contents;"></span>
    <span class="filter-label" style="margin-left:1rem;">Period:</span>
    <input type="date" id="dateFrom" title="From date"
           style="font-family:'Courier Prime',monospace; font-size:0.75rem; border:1px solid var(--outline); background:transparent; padding:2px 6px;"/>
    <span style="color:var(--text-muted);">–</span>
    <input type="date" id="dateTo" title="To date"
           style="font-family:'Courier Prime',monospace; font-size:0.75rem; border:1px solid var(--outline); background:transparent; padding:2px 6px;"/>
    <button class="filter-chip" id="dateClear" style="display:none;">✕ Reset</button>
</div>

<!-- Gallery Content -->
<main class="gallery-content" id="galleryContent">
    <!-- populated by JS -->
</main>

<!-- Mobile Bottom Nav -->
<nav class="mobile-bottom-nav">
    <a href="/dashboard" class="nav-item">
        <span class="material-symbols-outlined">book</span>
        <span class="label">Journal</span>
    </a>
    <a href="/gallery" class="nav-item active">
        <span class="material-symbols-outlined">photo_library</span>
        <span class="label">Gallery</span>
    </a>
    <a href="/medical" class="nav-item">
        <span class="material-symbols-outlined">medical_services</span>
        <span class="label">Medical</span>
    </a>
    <a href="/family" class="nav-item">
        <span class="material-symbols-outlined">groups</span>
        <span class="label">Family</span>
    </a>
    <a href="/admin" class="nav-item" id="adminBottomNav" style="display:none;">
        <span class="material-symbols-outlined">admin_panel_settings</span>
        <span class="label">Admin</span>
    </a>
</nav>

<!-- FAB -->
<button class="fab" id="fabBtn" title="Add moment" style="display:none;">
    <span class="material-symbols-outlined">add</span>
</button>

<!-- ── Add Moment Modal ── -->
<div class="modal-overlay" id="addMomentModal" role="dialog" aria-modal="true" aria-labelledby="addMomentTitle">
    <div class="modal-card">
        <div class="modal-washi"></div>
        <button class="modal-close" id="addMomentClose" aria-label="Close">&times;</button>

        <h2 class="modal-title" id="addMomentTitle">New Memory</h2>
        <p class="modal-subtitle">Series: MEM-2026 / GALLERY_ARCHIVE</p>

        <div class="modal-error" id="momentError">
            <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:middle;margin-right:4px;">error</span>
            <span id="momentErrorText"></span>
        </div>

        <form id="addMomentForm">
            <div class="modal-field">
                <label for="momentType">Type *</label>
                <select id="momentType" class="modal-select" required>
                    <option value="photo">📷 Photo</option>
                    <option value="video">🎬 Video</option>
                    <option value="audio">🎵 Audio</option>
                    <option value="text">📄 Text file</option>
                    <option value="note">📝 Note</option>
                </select>
            </div>

            <div class="modal-field">
                <label for="momentTitle">Title *</label>
                <input type="text" id="momentTitle" class="modal-input" placeholder="First smile..." required/>
            </div>

            <div class="modal-field">
                <label for="momentBody">Description</label>
                <textarea id="momentBody" class="modal-textarea" placeholder="Tell the story..."></textarea>
            </div>

            <div class="modal-field">
                <label for="momentDate">When did it happen?</label>
                <input type="datetime-local" id="momentDate" class="modal-input"/>
            </div>

            <div class="modal-field">
                <label for="momentTags">Tags <span style="opacity:0.5; text-transform:none;">(separate prin virgula)</span></label>
                <input type="text" id="momentTags" class="modal-input" placeholder="primul zambet, vara, bunici..." maxlength="340"/>
            </div>

            <!-- File upload (shown only for photo/video/audio) -->
            <div class="modal-field" id="momentFileField" style="display:none;">
                <label for="momentFile">Attach file</label>
                <input type="file" id="momentFile" class="modal-input"
                       accept="image/jpeg,image/png,image/webp,video/mp4,video/webm,video/quicktime,.mov,audio/mpeg,audio/mp4,audio/wav,audio/ogg,text/plain,.txt"
                       style="padding:0.3rem; cursor:pointer;"/>
                <span style="font-family:'Special Elite',cursive; font-size:0.7rem; color:var(--text-muted); display:block; margin-top:4px;">
                    JPEG, PNG, WebP, MP4, MP3, TXT — max 10 MB
                </span>
            </div>

            <div class="modal-field" style="display:flex; gap:2rem; flex-wrap:wrap;">
                <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; text-transform:none; letter-spacing:0;">
                    <input type="checkbox" id="momentPinned" style="accent-color:var(--secondary);">
                    <span style="font-family:'Special Elite',cursive; font-size:0.85rem;">Pin to shelf ⭐</span>
                </label>
                <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; text-transform:none; letter-spacing:0;">
                    <input type="checkbox" id="momentShared" style="accent-color:var(--secondary);">
                    <span style="font-family:'Special Elite',cursive; font-size:0.85rem;">Share with family viewers 👁</span>
                </label>
            </div>

            <button type="submit" id="momentSubmitBtn" class="modal-submit">
                Stamp in Archive
            </button>
        </form>
    </div>
</div>

<!-- ── Detail Modal (click on polaroid) ── -->
<div class="modal-overlay" id="detailModal" role="dialog" aria-modal="true">
    <div class="modal-card">
        <div class="modal-washi"></div>
        <button class="modal-close" id="detailClose" aria-label="Close">&times;</button>

        <div id="detailContent">
            <!-- populated by JS -->
        </div>
    </div>
</div>

<script src="/js/gallery.js"></script>
</body>
</html>
