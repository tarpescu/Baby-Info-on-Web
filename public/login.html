<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Member Login | Baby Info</title>

    <!-- Google Fonts Import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Bricolage+Grotesque:wght@400;600;800&family=Caveat:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<main class="wrapper">
    <!-- Background Decor -->
    <div class="kraft-texture"></div>
    <div class="sage-scrap"></div>
    <div class="paper-clip"></div>

    <!-- Peeking Polaroid -->
    <div class="peeking-polaroid">
        <img src="https://images.unsplash.com/photo-1519689680058-324335c77eba?auto=format&fit=crop&w=300&q=80" alt="Vintage baby photo">
        <div style="position: absolute; inset: 0; background: rgba(157, 66, 44, 0.05); mix-blend-mode: overlay;"></div>
    </div>

    <!-- The Index Card (Login Form) -->
    <div class="index-card">
        <div class="washi-tape"></div>

        <header>
            <a href="/" style="text-decoration:none;">
                <h1 class="doc-title font-headline">Baby Info</h1>
            </a>
            <p class="doc-subtitle font-typewriter">MEMBER LOGIN / ACCESS PORTAL &#8470; 842-B</p>
        </header>

        <form id="loginForm" style="flex-grow: 1; display: flex; flex-direction: column;">

            <div class="form-group">
                <label class="font-typewriter" for="email">Email Address:</label>
                <input type="email" id="email" name="email" class="form-input font-body" placeholder="type here..." required>
            </div>

            <div class="form-group">
                <label class="font-typewriter" for="password">Secret Key:</label>
                <input type="password" id="password" name="password" class="form-input font-body" placeholder="********" required>
                <a href="/forgot-password" class="forgot-pass font-handwritten">Forgot password?</a>
            </div>

            <!-- Mesaj eroare in stil vintage -->
            <div id="loginError" style="display:none; margin-bottom:1rem; padding:0.75rem 1rem; background:rgba(157,66,44,0.08); border-left:3px solid var(--secondary); font-family:'Special Elite',cursive; font-size:0.9rem; color:var(--secondary);">
                <span class="material-symbols-outlined" style="font-size:1rem; vertical-align:middle; margin-right:4px;">error</span>
                <span id="loginErrorText"></span>
            </div>

            <div class="submit-section">
                <button type="submit" id="loginBtn" class="ink-seal font-typewriter">
                    <span class="text">LOGIN</span>
                    <span class="material-symbols-outlined icon">history_edu</span>
                    <span class="subtext font-label">VERIFIED</span>
                </button>

                <p class="signup-link font-body">
                    New to the family? <a href="/register">Create new account</a>
                </p>
                <p class="signup-link font-body" style="font-size:0.9rem;">
                    Have an invite link? <a href="/join">Join here</a>
                </p>
            </div>

        </form>

        <footer class="footer-stamp font-typewriter">
            <span>ARCHIVE VOL. 2026</span>
            <span>STAMPED &amp; FILED</span>
        </footer>
    </div>
</main>

<script>
    /* @author Romila Raluca */

    // Micro-interaction: Focus wiggle
    const inputs = document.querySelectorAll('.form-input');
    const card = document.querySelector('.index-card');

    inputs.forEach(input => {
        input.addEventListener('focus', () => {
            card.style.transform = 'scale(1.01) rotate(0deg)';
        });
        input.addEventListener('blur', () => {
            card.style.transform = '';
        });
    });

    // Mesaj de bun-venit dupa inregistrare reusita
    if (new URLSearchParams(window.location.search).get('registered') === '1') {
        const notice = document.createElement('div');
        notice.style.cssText = 'padding:0.6rem 1rem; background:rgba(100,160,100,0.12); border-left:3px solid #5a9a5a; font-family:"Special Elite",cursive; font-size:0.9rem; color:#3d6e3d; margin-bottom:1.5rem;';
        notice.innerHTML = '<span class="material-symbols-outlined" style="font-size:1rem;vertical-align:middle;margin-right:4px;">check_circle</span> Account created! Please log in.';
        document.getElementById('loginForm').prepend(notice);
    }

    // ── Autentificare cu fetch() ────────────────────────────────────────────
    const loginForm = document.getElementById('loginForm');
    const loginBtn  = document.getElementById('loginBtn');
    const errorBox  = document.getElementById('loginError');
    const errorText = document.getElementById('loginErrorText');

    /**
     * Afiseaza un mesaj de eroare in caseta vintage.
     * @param {string} msg
     */
    function showError(msg) {
        errorText.textContent = msg;
        errorBox.style.display = 'block';
        card.style.transform = 'rotate(-1deg)';
        setTimeout(() => { card.style.transform = ''; }, 400);
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.style.display = 'none';

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        // Stare de incarcare pe sigiliu
        loginBtn.querySelector('.text').textContent    = '...';
        loginBtn.querySelector('.subtext').textContent = 'WAIT';
        loginBtn.disabled = true;

        try {
            const res = await fetch('/api/auth/login', {
                method:      'POST',
                headers:     { 'Content-Type': 'application/json' },
                credentials: 'include',
                body:        JSON.stringify({ email, password }),
            });

            const data = await res.json();

            if (!res.ok) {
                showError(data.error || 'Login failed. Please try again.');
                loginBtn.querySelector('.text').textContent    = 'LOGIN';
                loginBtn.querySelector('.subtext').textContent = 'VERIFIED';
                loginBtn.disabled = false;
                return;
            }

            // Succes — redirect catre dashboard
            loginBtn.querySelector('.text').textContent    = 'OPEN';
            loginBtn.querySelector('.subtext').textContent = 'WELCOME';
            window.location.href = '/dashboard';

        } catch (err) {
            showError('Connection error. Please try again.');
            loginBtn.querySelector('.text').textContent    = 'LOGIN';
            loginBtn.querySelector('.subtext').textContent = 'VERIFIED';
            loginBtn.disabled = false;
        }
    });
</script>
</body>
</html>
