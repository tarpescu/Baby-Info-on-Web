<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Member Login | Baby Info</title>

    <!-- Google Fonts Import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Bricolage+Grotesque:wght@400;600;800&family=Caveat:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        /* @author Romila Raluca */

        /* ─────────────────────────────────────────────
           1. CSS VARIABLES (THE VINTAGE PALETTE)
        ───────────────────────────────────────────── */
        :root {
            --bg-paper: #e0d9cd; /* Kraft paper base for this page */
            --primary: #130202;
            --secondary: #9d422c; /* The red ink/seal color */
            --text-body: #504443;
            --text-muted: #75889c;

            --scrap-sage: #d8e2dc;
            --outline: #d4c2c1;
            --tape-blue: rgba(131, 166, 183, 0.6);
        }

        /* ─────────────────────────────────────────────
           2. RESET & BASE
        ───────────────────────────────────────────── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-paper);
            background-image: radial-gradient(circle at 2px 2px, rgba(0,0,0,0.03) 1px, transparent 0);
            background-size: 24px 24px;
            color: var(--text-body);
            font-family: 'Courier Prime', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 1rem;
        }

        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; border: none; font-family: inherit; }
        input { font-family: inherit; }

        .font-headline { font-family: 'Libre Caslon Text', serif; }
        .font-handwritten { font-family: 'Caveat', cursive; }
        .font-typewriter { font-family: 'Special Elite', cursive; }
        .font-label { font-family: 'Bricolage Grotesque', sans-serif; }

        .material-symbols-outlined { vertical-align: middle; }

        /* ─────────────────────────────────────────────
           3. MAIN LAYOUT & DECORATIONS
        ───────────────────────────────────────────── */
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            transform: rotate(1deg);
        }

        /* Background texture elements */
        .kraft-texture {
            position: absolute;
            top: -3rem; left: -4rem;
            width: 8rem; height: 8rem;
            background-color: #dccfb8;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            opacity: 0.4;
            transform: rotate(12deg);
            z-index: -1;
            border-radius: 4px;
        }

        .sage-scrap {
            position: absolute;
            bottom: -2rem; right: -3rem;
            width: 12rem; height: 6rem;
            background-color: var(--scrap-sage);
            opacity: 0.3;
            transform: rotate(-6deg);
            z-index: -1;
            clip-path: polygon(
                    0% 0%, 100% 0%, 100% 95%, 98% 98%, 95% 94%,
                    92% 99%, 88% 95%, 85% 100%, 80% 94%, 75% 98%,
                    70% 95%, 65% 100%, 60% 94%, 55% 98%, 52% 95%,
                    48% 100%, 45% 94%, 40% 98%, 35% 95%, 30% 100%,
                    25% 94%, 20% 98%, 15% 95%, 10% 100%, 5% 94%, 0% 98%
            );
        }

        /* The Index Card */
        .index-card {
            background-color: #ffffff;
            background-image: linear-gradient(rgba(173, 216, 230, 0.5) 1px, transparent 1px);
            background-size: 100% 2.5rem;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1), 10px 10px 25px rgba(0,0,0,0.05);
            position: relative;
            padding: 3rem;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        /* The Red Top Line of the Index Card */
        .index-card::before {
            content: '';
            position: absolute;
            top: 2.5rem;
            left: 0; right: 0;
            height: 1px;
            background: rgba(255, 0, 0, 0.2);
        }

        .washi-tape {
            position: absolute;
            top: -1.5rem; left: -2rem;
            width: 120px; height: 40px;
            background: var(--tape-blue);
            backdrop-filter: blur(1px);
            transform: rotate(-3deg);
            clip-path: polygon(0% 15%, 5% 0%, 95% 5%, 100% 15%, 98% 85%, 92% 100%, 8% 95%, 0% 85%);
            z-index: 20;
        }

        .paper-clip {
            position: absolute;
            top: -20px; right: 40px;
            width: 30px; height: 60px;
            border: 3px solid #94a3b8;
            border-radius: 20px;
            transform: rotate(10deg);
            z-index: 30;
        }
        .paper-clip::after {
            content: '';
            position: absolute;
            top: 5px; left: 3px; right: 3px; bottom: 15px;
            border: 3px solid #94a3b8;
            border-radius: 15px;
        }

        /* ─────────────────────────────────────────────
           4. FORM ELEMENTS
        ───────────────────────────────────────────── */
        header {
            margin-bottom: 3rem;
            padding-top: 1rem;
            text-align: center;
        }

        .doc-title {
            font-size: 2.5rem;
            color: var(--primary);
            line-height: 1.2;
        }

        .doc-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            opacity: 0.7;
        }

        .form-group {
            margin-bottom: 2.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--outline);
            font-size: 1.2rem;
            color: var(--primary);
            padding: 0 0 0.25rem 0;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-bottom-color: var(--secondary);
        }
        .form-input::placeholder { opacity: 0.3; }

        .forgot-pass {
            position: absolute;
            bottom: -1.5rem; right: 0;
            font-size: 1.2rem;
            color: var(--secondary);
            transform: rotate(-2deg);
            transition: color 0.2s;
        }
        .forgot-pass:hover { color: var(--primary); }

        /* The Wax Seal / Ink Stamp Button */
        .submit-section {
            margin-top: auto;
            padding-top: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .ink-seal {
            width: 8rem; height: 8rem;
            border-radius: 50%;
            background-color: var(--secondary);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
            border: 4px dashed rgba(255,255,255,0.2);
            mask-image: radial-gradient(circle, black 70%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle, black 70%, transparent 100%);
            transition: all 0.2s ease;
        }
        .ink-seal:hover {
            transform: scale(1.05) rotate(2deg);
            filter: brightness(1.1);
        }
        .ink-seal:active { transform: scale(0.95); }

        .ink-seal span.text { font-size: 0.85rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 4px; }
        .ink-seal span.icon { font-size: 2.5rem; }
        .ink-seal span.subtext { font-size: 0.65rem; opacity: 0.8; margin-top: 4px; }

        .signup-link {
            font-size: 1rem;
            color: var(--text-muted);
        }
        .signup-link a {
            color: var(--secondary);
            text-decoration: underline;
            text-decoration-style: wavy;
            text-underline-offset: 4px;
        }
        .signup-link a:hover { color: var(--primary); }

        .footer-stamp {
            margin-top: 2rem;
            border-top: 1px solid var(--outline);
            padding-top: 1rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        /* Peeking Polaroid */
        .peeking-polaroid {
            position: absolute;
            bottom: -6rem; left: -5rem;
            width: 12rem; height: 14rem;
            background: #fff;
            padding: 10px 10px 40px 10px;
            box-shadow: 5px 15px 25px rgba(0,0,0,0.1);
            transform: rotate(-12deg);
            z-index: -2;
            border: 1px solid var(--outline);
        }
        .peeking-polaroid img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: sepia(0.5) contrast(1.2) grayscale(0.2);
        }
        .peeking-polaroid::after {
            content: 'First Day Home';
            position: absolute;
            bottom: 10px; left: 0; width: 100%;
            text-align: center;
            font-family: 'Caveat', cursive;
            font-size: 1.5rem;
            color: var(--text-body);
        }

        @media (max-width: 768px) {
            .peeking-polaroid { display: none; }
            .index-card { padding: 2rem; }
        }
    </style>
</head>
<body>

<main class="wrapper">
    <!-- Background Decor -->
    <div class="kraft-texture"></div>
    <div class="sage-scrap"></div>
    <div class="paper-clip"></div>

    <!-- Peeking Polaroid -->
    <div class="peeking-polaroid">
        <img src="https://images.unsplash.com/photo-1519689680058-324335c77eba?auto=format&fit=crop&w=300&q=80" alt="Vintage baby photo">
        <div style="position: absolute; inset: 0; background: rgba(157, 66, 44, 0.05); mix-blend-mode: overlay;"></div>
    </div>

    <!-- The Index Card (Login Form) -->
    <div class="index-card">
        <div class="washi-tape"></div>

        <header>
            <a href="/" style="text-decoration:none;">
                <h1 class="doc-title font-headline">Baby Info</h1>
            </a>
            <p class="doc-subtitle font-typewriter">MEMBER LOGIN / ACCESS PORTAL &#8470; 842-B</p>
        </header>

        <form id="loginForm" style="flex-grow: 1; display: flex; flex-direction: column;">

            <div class="form-group">
                <label class="font-typewriter" for="email">Email Address:</label>
                <input type="email" id="email" name="email" class="form-input font-body" placeholder="type here..." required>
            </div>

            <div class="form-group">
                <label class="font-typewriter" for="password">Secret Key:</label>
                <input type="password" id="password" name="password" class="form-input font-body" placeholder="********" required>
                <a href="/forgot-password" class="forgot-pass font-handwritten">Forgot password?</a>
            </div>

            <!-- Mesaj eroare in stil vintage -->
            <div id="loginError" style="display:none; margin-bottom:1rem; padding:0.75rem 1rem; background:rgba(157,66,44,0.08); border-left:3px solid var(--secondary); font-family:'Special Elite',cursive; font-size:0.9rem; color:var(--secondary);">
                <span class="material-symbols-outlined" style="font-size:1rem; vertical-align:middle; margin-right:4px;">error</span>
                <span id="loginErrorText"></span>
            </div>

            <div class="submit-section">
                <button type="submit" id="loginBtn" class="ink-seal font-typewriter">
                    <span class="text">LOGIN</span>
                    <span class="material-symbols-outlined icon">history_edu</span>
                    <span class="subtext font-label">VERIFIED</span>
                </button>

                <p class="signup-link font-body">
                    New to the family? <a href="/register">Request Entry</a>
                </p>
            </div>

        </form>

        <footer class="footer-stamp font-typewriter">
            <span>ARCHIVE VOL. 2026</span>
            <span>STAMPED &amp; FILED</span>
        </footer>
    </div>
</main>

<script>
    /* @author Romila Raluca */

    // Micro-interaction: Focus wiggle
    const inputs = document.querySelectorAll('.form-input');
    const card = document.querySelector('.index-card');

    inputs.forEach(input => {
        input.addEventListener('focus', () => {
            card.style.transform = 'scale(1.01) rotate(0deg)';
        });
        input.addEventListener('blur', () => {
            card.style.transform = '';
        });
    });

    // Mesaj de bun-venit dupa inregistrare reusita
    if (new URLSearchParams(window.location.search).get('registered') === '1') {
        const notice = document.createElement('div');
        notice.style.cssText = 'padding:0.6rem 1rem; background:rgba(100,160,100,0.12); border-left:3px solid #5a9a5a; font-family:"Special Elite",cursive; font-size:0.9rem; color:#3d6e3d; margin-bottom:1.5rem;';
        notice.innerHTML = '<span class="material-symbols-outlined" style="font-size:1rem;vertical-align:middle;margin-right:4px;">check_circle</span> Account created! Please log in.';
        document.getElementById('loginForm').prepend(notice);
    }

    // ── Autentificare cu fetch() ────────────────────────────────────────────
    const loginForm = document.getElementById('loginForm');
    const loginBtn  = document.getElementById('loginBtn');
    const errorBox  = document.getElementById('loginError');
    const errorText = document.getElementById('loginErrorText');

    /**
     * Afiseaza un mesaj de eroare in caseta vintage.
     * @param {string} msg
     */
    function showError(msg) {
        errorText.textContent = msg;
        errorBox.style.display = 'block';
        card.style.transform = 'rotate(-1deg)';
        setTimeout(() => { card.style.transform = ''; }, 400);
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.style.display = 'none';

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        // Stare de incarcare pe sigiliu
        loginBtn.querySelector('.text').textContent    = '...';
        loginBtn.querySelector('.subtext').textContent = 'WAIT';
        loginBtn.disabled = true;

        try {
            const res = await fetch('/api/auth/login', {
                method:      'POST',
                headers:     { 'Content-Type': 'application/json' },
                credentials: 'include',
                body:        JSON.stringify({ email, password }),
            });

            const data = await res.json();

            if (!res.ok) {
                showError(data.error || 'Login failed. Please try again.');
                loginBtn.querySelector('.text').textContent    = 'LOGIN';
                loginBtn.querySelector('.subtext').textContent = 'VERIFIED';
                loginBtn.disabled = false;
                return;
            }

            // Succes — redirect catre dashboard
            loginBtn.querySelector('.text').textContent    = 'OPEN';
            loginBtn.querySelector('.subtext').textContent = 'WELCOME';
            window.location.href = '/dashboard';

        } catch (err) {
            showError('Connection error. Please try again.');
            loginBtn.querySelector('.text').textContent    = 'LOGIN';
            loginBtn.querySelector('.subtext').textContent = 'VERIFIED';
            loginBtn.disabled = false;
        }
    });
</script>
</body>
</html>
